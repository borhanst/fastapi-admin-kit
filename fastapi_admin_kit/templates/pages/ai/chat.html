{# pages/ai/chat.html — Full-page AI Chat Interface #}
{% extends "base.html" %}

{% block title %}AI Chat{% endblock %}

{% block head_extra %}
<style>
  .ai-chat-page {
    display: flex;
    flex-direction: column;
    height: calc(100vh - var(--topbar-height) - 2px);
    margin: 0 calc(-1 * var(--content-padding));
    margin-top: calc(-1 * var(--content-padding));
  }

  .ai-chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px var(--content-padding);
    background: var(--surface-raised);
    border-bottom: 1px solid var(--surface-border);
    flex-shrink: 0;
  }

  .ai-chat-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .ai-chat-avatar {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-lg);
    background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    flex-shrink: 0;
  }

  .ai-chat-header-info h1 {
    font-family: var(--font-display);
    font-size: var(--text-md);
    font-weight: 600;
    color: var(--text-primary);
    margin: 0;
    line-height: 1.3;
  }

  .ai-chat-header-info p {
    font-size: var(--text-xs);
    color: var(--text-tertiary);
    margin: 0;
  }

  .ai-chat-agent-select {
    padding: 6px 12px;
    border: 1px solid var(--surface-border);
    border-radius: var(--radius-md);
    background: var(--surface-base);
    color: var(--text-primary);
    font-size: var(--text-sm);
    font-family: var(--font-body);
    cursor: pointer;
    outline: none;
    transition: border-color var(--duration-fast) var(--easing-out);
  }

  .ai-chat-agent-select:focus {
    border-color: var(--primary-500);
    box-shadow: var(--shadow-focus);
  }

  .ai-chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px var(--content-padding);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .ai-chat-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-disabled);
  }

  .ai-chat-empty-icon {
    width: 72px;
    height: 72px;
    border-radius: var(--radius-xl);
    background: var(--surface-inset);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ai-chat-empty-icon .material-symbols-outlined {
    font-size: 36px;
    color: var(--text-disabled);
  }

  .ai-chat-empty h3 {
    font-family: var(--font-display);
    font-size: var(--text-lg);
    font-weight: 600;
    color: var(--text-secondary);
    margin: 0;
  }

  .ai-chat-empty p {
    font-size: var(--text-sm);
    color: var(--text-disabled);
    max-width: 320px;
    text-align: center;
    line-height: 1.6;
    margin: 0;
  }

  .ai-chat-suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }

  .ai-chat-suggestion {
    padding: 8px 16px;
    border: 1px solid var(--surface-border);
    border-radius: var(--radius-full);
    background: var(--surface-raised);
    color: var(--text-secondary);
    font-size: var(--text-sm);
    cursor: pointer;
    transition: all var(--duration-fast) var(--easing-out);
    font-family: var(--font-body);
  }

  .ai-chat-suggestion:hover {
    border-color: var(--primary-500);
    color: var(--primary-600);
    background: var(--primary-50);
  }

  .ai-chat-msg {
    display: flex;
    gap: 12px;
    max-width: 720px;
    animation: chatMsgIn 0.2s var(--easing-out);
  }

  .ai-chat-msg--user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .ai-chat-msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: var(--text-xs);
    font-weight: 600;
  }

  .ai-chat-msg--ai .ai-chat-msg-avatar {
    background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
    color: white;
  }

  .ai-chat-msg--user .ai-chat-msg-avatar {
    background: var(--surface-inset);
    color: var(--text-secondary);
  }

  .ai-chat-msg-body {
    padding: 12px 16px;
    border-radius: var(--radius-lg);
    font-size: var(--text-sm);
    line-height: 1.7;
    color: var(--text-primary);
  }

  .ai-chat-msg--ai .ai-chat-msg-body {
    background: var(--surface-raised);
    border: 1px solid var(--surface-border);
    border-top-left-radius: var(--radius-sm);
  }

  .ai-chat-msg--user .ai-chat-msg-body {
    background: var(--primary-600);
    color: white;
    border-top-right-radius: var(--radius-sm);
  }

  .ai-chat-msg-body p { margin: 0 0 8px 0; }
  .ai-chat-msg-body p:last-child { margin-bottom: 0; }
  .ai-chat-msg-body code {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    background: rgba(0,0,0,0.06);
  }

  [data-theme="dark"] .ai-chat-msg-body code {
    background: rgba(255,255,255,0.1);
  }

  .ai-chat-msg--user .ai-chat-msg-body code {
    background: rgba(255,255,255,0.2);
    color: white;
  }

  .ai-chat-msg-time {
    font-size: var(--text-2xs);
    color: var(--text-disabled);
    margin-top: 4px;
    padding: 0 4px;
  }

  .ai-chat-msg--user .ai-chat-msg-time {
    text-align: right;
  }

  .ai-chat-typing {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 0;
  }

  .ai-chat-typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-disabled);
    animation: typingBounce 1.2s infinite;
  }

  .ai-chat-typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .ai-chat-typing-dot:nth-child(3) { animation-delay: 0.4s; }

  .ai-chat-input-bar {
    padding: 16px var(--content-padding);
    background: var(--surface-raised);
    border-top: 1px solid var(--surface-border);
    flex-shrink: 0;
  }

  .ai-chat-input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    max-width: 720px;
    margin: 0 auto;
  }

  .ai-chat-input-field {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid var(--surface-border);
    border-radius: var(--radius-lg);
    background: var(--surface-base);
    color: var(--text-primary);
    font-size: var(--text-sm);
    font-family: var(--font-body);
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 160px;
    line-height: 1.5;
    transition: border-color var(--duration-fast) var(--easing-out);
  }

  .ai-chat-input-field::placeholder {
    color: var(--text-disabled);
  }

  .ai-chat-input-field:focus {
    border-color: var(--primary-500);
    box-shadow: var(--shadow-focus);
  }

  .ai-chat-send-btn {
    width: 44px;
    height: 44px;
    border-radius: var(--radius-lg);
    border: none;
    background: var(--primary-600);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all var(--duration-fast) var(--easing-out);
  }

  .ai-chat-send-btn:hover {
    background: var(--primary-700);
    transform: scale(1.05);
  }

  .ai-chat-send-btn:active {
    transform: scale(0.95);
  }

  .ai-chat-send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .ai-chat-send-btn .material-symbols-outlined {
    font-size: 20px;
    pointer-events: none;
  }

  @keyframes chatMsgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }
</style>
{% endblock %}

{% block content %}
<div class="ai-chat-page" x-data="aiChat()" x-init="init()">
  <div class="ai-chat-header">
    <div class="ai-chat-header-left">
      <div class="ai-chat-avatar">
        <span class="material-symbols-outlined">smart_toy</span>
      </div>
      <div class="ai-chat-header-info">
        <h1>AI Assistant</h1>
        <p>Ask anything about your data</p>
      </div>
    </div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <select class="ai-chat-agent-select" x-model="selectedAgent" @change="loadAgents()">
        <template x-for="agent in agents" :key="agent.name">
          <option :value="agent.name" x-text="agent.name"></option>
        </template>
      </select>
      <button @click="clearChat()" class="btn btn-secondary btn-sm" title="Clear chat">
        <span class="material-symbols-outlined">delete_sweep</span>
        Clear
      </button>
    </div>
  </div>

  <div class="ai-chat-messages" x-ref="messagesContainer">
    <template x-if="messages.length === 0">
      <div class="ai-chat-empty">
        <div class="ai-chat-empty-icon">
          <span class="material-symbols-outlined">auto_awesome</span>
        </div>
        <h3>How can I help?</h3>
        <p>Ask questions about your data, generate reports, or manage records using natural language.</p>
        <div class="ai-chat-suggestions">
          <button class="ai-chat-suggestion" @click="sendSuggestion('Show me a summary of all users')">Show users summary</button>
          <button class="ai-chat-suggestion" @click="sendSuggestion('Generate a report of recent activity')">Recent activity report</button>
          <button class="ai-chat-suggestion" @click="sendSuggestion('What tools are available?')">Available tools</button>
        </div>
      </div>
    </template>

    <template x-for="(msg, idx) in messages" :key="idx">
      <div>
        <div class="ai-chat-msg" :class="msg.role === 'user' ? 'ai-chat-msg--user' : 'ai-chat-msg--ai'">
          <div class="ai-chat-msg-avatar">
            <template x-if="msg.role === 'ai'">
              <span class="material-symbols-outlined" style="font-size: 16px;">smart_toy</span>
            </template>
            <template x-if="msg.role === 'user'">
              <span class="material-symbols-outlined" style="font-size: 16px;">person</span>
            </template>
          </div>
          <div class="ai-chat-msg-body" x-html="formatMessage(msg.text)"></div>
        </div>
        <div class="ai-chat-msg-time" :class="msg.role === 'user' ? 'ai-chat-msg--user' : ''" x-text="msg.time"></div>
      </div>
    </template>

    <template x-if="isTyping">
      <div class="ai-chat-msg ai-chat-msg--ai">
        <div class="ai-chat-msg-avatar" style="background: linear-gradient(135deg, var(--primary-500), var(--primary-700)); color: white;">
          <span class="material-symbols-outlined" style="font-size: 16px;">smart_toy</span>
        </div>
        <div class="ai-chat-msg-body">
          <div class="ai-chat-typing">
            <div class="ai-chat-typing-dot"></div>
            <div class="ai-chat-typing-dot"></div>
            <div class="ai-chat-typing-dot"></div>
          </div>
        </div>
      </div>
    </template>
  </div>

  <div class="ai-chat-input-bar">
    <div class="ai-chat-input-wrapper">
      <textarea
        class="ai-chat-input-field"
        x-model="userInput"
        @keydown.enter.prevent="sendMessage()"
        placeholder="Type your message..."
        rows="1"
        x-ref="chatInput"
        :disabled="isTyping"
      ></textarea>
      <button
        class="ai-chat-send-btn"
        @click="sendMessage()"
        :disabled="!userInput.trim() || isTyping"
        title="Send message"
      >
        <span class="material-symbols-outlined">arrow_upward</span>
      </button>
    </div>
  </div>
</div>

<script>
function aiChat() {
  return {
    messages: [],
    userInput: '',
    isTyping: false,
    selectedAgent: 'default',
    agents: [],
    conversationId: null,

    async init() {
      await this.loadAgents();
      this.$nextTick(() => {
        this.autoResize(this.$refs.chatInput);
        this.$refs.chatInput?.focus();
      });
    },

    async loadAgents() {
      try {
        const resp = await fetch(window.__ADMIN_PATH__ + '/ai/agents');
        this.agents = await resp.json();
        if (this.agents.length && !this.agents.find(a => a.name === this.selectedAgent)) {
          this.selectedAgent = this.agents[0].name;
        }
      } catch (e) {
        this.agents = [{ name: 'default', model: 'unknown', tools: 0 }];
      }
    },

    async sendMessage() {
      const text = this.userInput.trim();
      if (!text || this.isTyping) return;

      this.addMessage('user', text);
      this.userInput = '';
      this.isTyping = true;
      this.scrollToBottom();

      try {
        const resp = await fetch(window.__ADMIN_PATH__ + '/ai/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            agent: this.selectedAgent,
            conversation_id: this.conversationId
          })
        });
        const data = await resp.json();
        this.isTyping = false;

        if (data.error) {
          this.addMessage('ai', 'Error: ' + data.error);
        } else {
          this.conversationId = data.conversation_id || this.conversationId;
          this.addMessage('ai', data.output);
        }
      } catch (e) {
        this.isTyping = false;
        this.addMessage('ai', 'Request failed: ' + e.message);
      }

      this.scrollToBottom();
    },

    sendSuggestion(text) {
      this.userInput = text;
      this.sendMessage();
    },

    addMessage(role, text) {
      const now = new Date();
      const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      this.messages.push({ role, text, time });
    },

    clearChat() {
      this.messages = [];
      this.conversationId = null;
    },

    formatMessage(text) {
      if (!text) return '';
      let html = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
      return html;
    },

    scrollToBottom() {
      this.$nextTick(() => {
        const el = this.$refs.messagesContainer;
        if (el) el.scrollTop = el.scrollHeight;
      });
    },

    autoResize(el) {
      if (!el) return;
      el.addEventListener('input', () => {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 160) + 'px';
      });
    }
  };
}
</script>
{% endblock %}
